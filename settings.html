<!DOCTYPE html>
<html>
<head>
    <title>Learning App Settings</title>
    <style>
        body { font-family: Arial; padding: 20px; background-color: #f7f7f7; }
        label { display: block; margin-top: 10px; }
        input, select { margin-top: 5px; padding: 5px; width: 200px; }
        button { margin-top: 15px; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Learning App Settings</h1>

    <!-- Settings Form -->
    <form method="POST">
        <label>Game Type:
            <select name="game_type">
                <option value="quiz" {% if settings and settings.game_type=='quiz' %}selected{% endif %}>Quiz</option>
                <option value="flashcards" {% if settings and settings.game_type=='flashcards' %}selected{% endif %}>Flashcards</option>
                <option value="puzzle" {% if settings and settings.game_type=='puzzle' %}selected{% endif %}>Puzzle</option>
            </select>
        </label>

        <label>Difficulty:
            <select name="difficulty">
                <option value="easy" {% if settings and settings.difficulty=='easy' %}selected{% endif %}>Easy</option>
                <option value="medium" {% if settings and settings.difficulty=='medium' %}selected{% endif %}>Medium</option>
                <option value="hard" {% if settings and settings.difficulty=='hard' %}selected{% endif %}>Hard</option>
            </select>
        </label>

        <label>
            <input type="checkbox" name="timer" {% if settings and settings.timer %}checked{% endif %}>
            Enable Timer
        </label>

        <label>Background Color:
            <input type="color" name="bg_color" value="{{ settings.bg_color if settings else '#ffffff' }}">
        </label>

        <label>Text Color:
            <input type="color" name="text_color" value="{{ settings.text_color if settings else '#000000' }}">
        </label>

        <button type="submit">Save Settings</button>
    </form>

    <hr>

    <!-- File Upload Form -->
    <h2>Upload Document</h2>
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <input type="file" name="document" accept=".pdf,.txt,.docx" required>
        <button type="submit">Upload & Generate</button>
    </form>
</body>
</html>
