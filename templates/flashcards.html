<!DOCTYPE html>
<html>
<head>

<title>Flashcards</title>

<style>

body{
font-family:Arial;
background:#6366f1;
color:white;
text-align:center;
padding:40px;
}

.card{
width:400px;
height:250px;
margin:auto;
background:white;
color:black;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

button{
margin-top:20px;
padding:10px 20px;
}

</style>

</head>

<body>

<h1>Flashcards</h1>

<div class="card" onclick="flip()" id="card"></div>

<button onclick="nextCard()">Next</button>

<script>

let cards = {{ flashcards | tojson }};

let current = 0;
let flipped = false;

function showCard(){

let c = cards[current];

document.getElementById("card").innerText =
flipped ? c.back : c.front;

}

function flip(){

flipped = !flipped;
showCard();

}

function nextCard(){

current++;

if(current >= cards.length){
alert("Flashcards complete!");
return;
}

flipped = false;
showCard();

}

showCard();

</script>

</body>
</html>
